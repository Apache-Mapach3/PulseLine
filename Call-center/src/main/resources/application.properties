spring.main.headless=false
server.port=8081
spring.application.name=PulseLine Call Center
# BASE DE DATOS PRINCIPAL H2
spring.datasource.url=jdbc:h2:mem:pulselinedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# JPA / HIBERNATE
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# SQLITE 
app.sqlite.path=pulseline-auth.db
# LOGGING
logging.level.com.pulseline=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF